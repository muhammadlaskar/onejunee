<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Sayang!</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-white: #fff5f7;
            --text-dark: #4a4a4a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-white);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Section */
        #login-page {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }

        input {
            padding: 12px 20px;
            border: 2px solid var(--primary-pink);
            border-radius: 25px;
            margin-bottom: 20px;
            width: 80%;
            outline: none;
            font-size: 1rem;
        }

        /* Content Section (Hidden by default) */
        #main-content {
            display: none;
            width: 100%;
            text-align: center;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), 
                        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070') center/cover;
        }

        .btn-action {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-action:hover { transform: scale(1.05); }

        .balloon {
            position: fixed;
            bottom: -100px;
            font-size: 2rem;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- HALAMAN INPUT NAMA -->
    <div id="login-page">
        <h2 style="color: var(--primary-pink);">Siapa namamu? ❤️</h2>
        <input type="text" id="nameInput" placeholder="Masukkan nama panggilanmu...">
        <br>
        <button class="btn-action" onclick="checkName()">Buka Pesan</button>
        <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;">Maaf, sepertinya kamu bukan pemilik website ini!</p>
    </div>

    <!-- HALAMAN UTAMA (Konten Rahasia) -->
    <div id="main-content">
        <header>
            <h1 style="font-size: 3rem; color: var(--primary-pink);">Happy Birthday! 🎈</h1>
            <p>Hari ini adalah tentangmu dan kebahagiaanmu.</p>
            <button class="btn-action" onclick="createBalloon()">Klik untuk Kejutan!</button>
        </header>
        
        <div style="padding: 50px 20px;">
            <div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                <p>"Terima kasih sudah menjadi bagian dari hidupku. Semoga setiap langkahmu dipenuhi keberuntungan dan senyummu tidak pernah pudar."</p>
            </div>
        </div>
    </div>

    <script>
        function checkName() {
            const name = document.getElementById('nameInput').value.toLowerCase();
            const allowedNames = ['bhytania', 'avrinda', 'pubhyta', 'vanha', 'pubhy', 'pubi'];
            
            // Mengecek apakah input mengandung salah satu kata kunci di atas
            const isAllowed = allowedNames.some(allowed => name.includes(allowed));

            if (isAllowed) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                // Memberikan efek balon otomatis saat berhasil masuk
                createBalloon();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function createBalloon() {
            const emojis = ['🎈', '💖', '✨', '🎂', '🌸'];
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    balloon.style.left = Math.random() * 100 + 'vw';
                    balloon.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
