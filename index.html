<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Sayang!</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-white: #fff5f7;
            --text-dark: #4a4a4a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-white);
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), 
                        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070') center/cover;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--primary-pink);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Card Section */
        .card-container {
            padding: 50px 20px;
        }

        .photo-frame {
            width: 300px;
            height: 300px;
            border: 10px solid white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin: 0 auto 30px;
            overflow: hidden;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-box {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            line-height: 1.6;
        }

        /* Interaction Button */
        .btn-surprise {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }

        .btn-surprise:hover {
            transform: scale(1.1);
        }

        /* Balloon Animation */
        .balloon {
            position: fixed;
            bottom: -100px;
            font-size: 2rem;
            z-index: 999;
            animation: float Up 4s linear forwards;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Happy Birthday! 🎈</h1>
        <p>Hari ini adalah tentangmu dan kebahagiaanmu.</p>
        <button class="btn-surprise" onclick="createBalloon()">Klik untuk Kejutan!</button>
    </header>

    <div class="card-container">
        <div class="photo-frame">
            <!-- Ganti dengan URL foto pacar kamu -->
            <img src="https://via.placeholder.com/300" alt="Foto Pacar">
        </div>

        <div class="message-box">
            <h3>Untuk Seseorang yang Spesial,</h3>
            <p>"Terima kasih sudah menjadi bagian dari hidupku. Semoga di tahun yang baru ini, setiap langkahmu dipenuhi keberuntungan dan senyummu tidak pernah pudar."</p>
            <p><strong>- Dari Aku yang Selalu Mendukungmu</strong></p>
        </div>
    </div>

    <script>
        function createBalloon() {
            const emojis = ['🎈', '💖', '✨', '🎂', '🌸'];
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    balloon.style.left = Math.random() * 100 + 'vw';
                    balloon.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(balloon);
                    
                    setTimeout(() => balloon.remove(), 4000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
